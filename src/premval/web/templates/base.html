<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}premval{% endblock %}</title>
  <style>
    :root { --fg: #222; --muted: #777; --bg: #fafafa; --side: #f0f0f0;
            --accent: #2d6cdf; }
    * { box-sizing: border-box; }
    body { font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI",
           sans-serif; color: var(--fg); background: var(--bg); margin: 0; }
    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
    aside { background: var(--side); border-right: 1px solid #ddd;
            padding: 16px 12px; overflow-y: auto; }
    aside h1 { font-size: 14px; margin: 0 0 8px; text-transform: uppercase;
               letter-spacing: 0.05em; color: var(--muted); }
    aside h1 a { color: inherit; text-decoration: none; }
    aside ul { list-style: none; padding: 0; margin: 0; }
    aside li { margin: 1px 0; }
    aside a { display: block; padding: 4px 8px; color: var(--fg);
              text-decoration: none; border-radius: 3px;
              font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    aside a:hover { background: #e3e3e3; }
    aside a.active { background: var(--accent); color: white; }
    main { padding: 24px; min-width: 0; }
    h2 { margin-top: 0; }
    table.lb { border-collapse: collapse; width: 100%; background: white;
               border: 1px solid #ddd; }
    table.lb th, table.lb td { padding: 8px 12px; text-align: left;
                               border-bottom: 1px solid #eee; }
    table.lb th { background: #f5f5f5; font-weight: 600; }
    .empty { color: var(--muted); font-style: italic; padding: 24px;
             text-align: center; }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h1><a href="/">premval</a></h1>
      <h1 style="margin-top:16px">val chains</h1>
      <ul>
        {% for c in chains %}
        <li><a href="/chain/{{ c }}"
               class="{% if c == active_chain %}active{% endif %}">{{ c }}</a></li>
        {% endfor %}
      </ul>
    </aside>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
